
server.port=8082
spring.application.name=product-service

# 2. Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/auction_product_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_USENAME_HERE
# REPLACE THIS WITH YOUR ACTUAL MYSQL PASSWORD
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 4. JWT Configuration (MUST match the User Service exactly)
application.security.jwt.secret-key=SECRETKEY

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

spring.rabbitmq.addresses=YOUR_AMQP_ADDRESS
